# Nav2 Params
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: "scan"
    min_particles: 500
    max_particles: 2000
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 2
    transform_tolerance: 0.1
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "path/to/map.yaml"

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugin_ids: ["GridBased"]
    planner_plugin_types: ["nav2_navfn_planner/NavfnPlanner"]

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller/RegulatedPurePursuitController"
      desired_linear_vel: 0.2
      lookahead_dist: 0.4
      max_angular_vel: 1.5
      transform_tolerance: 0.2
